<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sol-p4-tools · Example</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; padding: 16px; }
      h1 { font-size: 16px; margin-bottom: 12px; }
      section { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; padding: 12px; }
      section h2 { font-size: 13px; margin-bottom: 8px; color: #475569; }
      label { display: block; margin: 4px 0; font-size: 12px; }
      input { padding: 4px 6px; font-size: 12px; width: 240px; }
      button { padding: 4px 12px; font-size: 12px; margin: 4px 4px 4px 0; cursor: pointer; }
      pre { background: #f8fafc; padding: 8px; border-radius: 4px; font-size: 11px; overflow: auto; max-height: 200px; white-space: pre-wrap; }
      .error { color: #dc2626; }
      .ok { color: #16a34a; }
    </style>
  </head>
